name: Update README On PR

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate README
        run: node generate-readme.js

      - name: Commit README changes (if needed)
        run: |
          if git diff --quiet README.md; then
            echo "README.md is up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: auto-update README from tools [skip ci]"

          BRANCH="${GITHUB_REF_NAME}"
          echo "Pushing changes to ${BRANCH}"

          for i in 1 2 3; do
            echo "Push attempt ${i}..."
            git pull --rebase origin "${BRANCH}"
            if git push origin "HEAD:${BRANCH}"; then
              echo "Push succeeded."
              exit 0
            fi
            sleep 2
          done

          echo "Failed to push after retries."
          exit 1
