name: Fetch Tool Images

on:
  push:
    paths:
      - "tools/operate/**"
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch screenshots and logos
        run: node scripts/fetch-images.js

      - name: Commit image updates
        run: |
          if git diff --quiet tools/operate public/screenshots public/logos; then
            echo "No image changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/operate public/screenshots public/logos
          git commit -m "chore: refresh tool images [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
